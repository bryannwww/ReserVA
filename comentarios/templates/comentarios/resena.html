{% extends 'base.html' %}

{% block title %}Deja tu Reseña | ReservA{% endblock %}

{% block content %}
<div class="contenedor">
    <div class="mi-formulario">
        <h2 style="color: #d4af37; margin-bottom: 20px;">Cuéntanos tu experiencia</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <p>Calificación Comida (1-5):</p>
            <input type="number" name="comida" min="1" max="5" required placeholder="5">
            
            <p>Calificación Servicio (1-5):</p>
            <input type="number" name="servicio" min="1" max="5" required placeholder="5">
            
            <p>Tu comentario:</p>
            <textarea name="comentario" rows="4" required placeholder="¿Qué tal estuvo todo?"></textarea>
            
            <button type="submit">Enviar reseña</button>
        </form>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'inicio' %}" style="color: #777; text-decoration: none; font-size: 0.9rem;">Volver al inicio</a>
        </div>
    </div>
</div>
{% endblock %}
